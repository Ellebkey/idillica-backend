# nginx — API directa en api-idilica.joelbarranco.io → Go en :8101
# Instalación (una vez):
#   sudo cp nginx-api-idilica.conf /etc/nginx/sites-available/api-idilica
#   sudo ln -s /etc/nginx/sites-available/api-idilica /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api-idilica.joelbarranco.io   # agrega el 443/SSL solo
server {
    listen 80;
    server_name api-idilica.joelbarranco.io;

    location / {
        proxy_pass http://127.0.0.1:8101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
